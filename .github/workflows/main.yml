name: deploy

on:
    push:
        branches: ['main']
    pull_request:
        branches: ['main', 'dev']

jobs:
    avoid_redundancy:
        runs-on: ubuntu-22.04
        steps:
            - name: Cancel Previous Runs
              uses: styfle/cancel-workflow-action@0.9.1
              with:
                  access_token: ${{ github.token }}

    lint:
        runs-on: ubuntu-22.04
        needs: avoid_redundancy
        steps:
            - name: Checkout
              uses: actions/checkout@v3

            - name: Use Node.js 22.x
              uses: actions/setup-node@v3
              with:
                  node-version: 22.x
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci --no-fund --no-audit --no-progress --no-warnings

            - name: Run linter
              run: npm run lint

    test:
        runs-on: ubuntu-22.04
        needs: lint
        strategy:
            matrix:
                node-version: [22.x, 20.x]
        steps:
            - name: Checkout
              uses: actions/checkout@v3

            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v3
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: 'npm'
            - name: Show current directory
              run: pwd

            - name: Create .env file
              run: |
                  echo "DATABASE_URL_TEST=${{ secrets.DATABASE_URL_TEST }}" >> .env
                  echo "DATABASE_URL_DEV=${{ secrets.DATABASE_URL_DEV }}" >> .env
                  echo "DATABASE_URL_PROD=${{ secrets.DATABASE_URL_PROD }}" >> .env
                  echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env

            - name: Verify .env file
              run: |
                  ls -la
                  cat .env
            - name: Upload .env artifact
              uses: actions/upload-artifact@v4
              with:
                  name: env-file
                  path: .env
                  include-hidden-files: true
                  overwrite: true
            - name: Install dependencies
              run: npm ci --no-fund --no-audit --no-progress --no-warnings
            - name: Generate Prisma Client
              run: npm run prisma:generate-client
            - name: Run tests
              run: npm run test

    build:
        runs-on: ubuntu-22.04
        needs: [lint, test]
        steps:
            - name: Checkout
              uses: actions/checkout@v3

            - name: Use Node.js 22.x
              uses: actions/setup-node@v3
              with:
                  node-version: 22.x
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci --no-fund --no-audit --no-progress --no-warnings
            - name: Download .env artifact
              uses: actions/download-artifact@v4
              with:
                  name: env-file
            - name: Generate Prisma Client
              run: npm run prisma:generate-client
            - name: Run build
              run: npm run build

    deploy:
        runs-on: ubuntu-22.04
        needs: build
        steps:
            - name: Checkout
              uses: actions/checkout@v3

            - name: Deploy to Hosting
              run: echo "Add your deployment command here"
