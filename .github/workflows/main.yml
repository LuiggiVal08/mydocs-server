name: Node.js CI

on:
    push:
        branches: ['main']
    pull_request:
        branches: ['main', 'dev']
jobs:
    build:
        runs-on: ubuntu-24.04

        strategy:
            matrix:
                node-version: [20.x, 22.x]

        steps:
            - name: Checkout
              uses: actions/checkout@v3
            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v3
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: 'npm'
            - name: Install dependencies
              run: npm install
            - name: Run linter
              run: npm run lint
            - name: Run tests
              run: npm run test
            - name: Run build
              run: npm run build
