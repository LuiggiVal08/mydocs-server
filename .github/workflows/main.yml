name: deploy

on:
    push:
        branches: ['main']
    pull_request:
        branches: ['main', 'dev']

jobs:
    avoid_redundancy:
        runs-on: ubuntu-22.04
        steps:
            - name: Cancel Previous Runs
              uses: styfle/cancel-workflow-action@0.9.1
              with:
                  access_token: ${{ github.token }}

    lint:
        runs-on: ubuntu-22.04
        needs: avoid_redundancy
        steps:
            - name: Checkout
              uses: actions/checkout@v3

            - name: Use Node.js 22.x
              uses: actions/setup-node@v3
              with:
                  node-version: 22.x
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci --no-fund --no-audit --no-progress --no-warnings

            - name: Run linter
              run: npm run lint

    test:
        runs-on: ubuntu-22.04
        needs: lint
        strategy:
            matrix:
                node-version: [22.x, 20.x]
        steps:
            - name: Checkout
              uses: actions/checkout@v3

            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v3
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci --no-fund --no-audit --no-progress --no-warnings

            - name: Run tests
              run: npm run test

    build:
        runs-on: ubuntu-22.04
        needs: [lint, test]
        steps:
            - name: Checkout
              uses: actions/checkout@v3

            - name: Use Node.js 22.x
              uses: actions/setup-node@v3
              with:
                  node-version: 22.x
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci --no-fund --no-audit --no-progress --no-warnings

            - name: Run build
              run: npm run build

    deploy:
        runs-on: ubuntu-22.04
        needs: build
        steps:
            - name: Checkout
              uses: actions/checkout@v3

            - name: Deploy to Hosting
              run: echo "Add your deployment command here"
